name: Bug Report
description: File a bug report
title: "[BUG]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description:
        Describe the bug clearly. What did you see, and what did you expect to
        see instead?
      placeholder: When I visit /blog/<slug>, the page does X. I expected it to
        do Y.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps someone else can follow to see the same
        bug.
      placeholder: |
        1. Open https://tech.weburz.com
        2. Click on ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Affected URL
      description: The exact page where the bug shows up, if applicable.
      placeholder: https://tech.weburz.com/blog/...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: The platform you saw the bug on.
      value: |
        - OS:
        - Browser + version:
        - Device (desktop / mobile):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Console errors, network failures, anything related. No need
        for backticks — this auto-formats as a shell block.
      render: Shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / video
      description: For visual bugs, a screenshot or short screen recording is
        worth far more than a description. Drag and drop into the box.
